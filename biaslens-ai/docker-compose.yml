services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      - UPLOADS_DIR=/app/uploads
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:80"
